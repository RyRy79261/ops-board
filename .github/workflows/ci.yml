name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Reusable toolchain setup is repeated per job (composite action would be nicer,
# but keeping it inline keeps this single-file + reviewable).
jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  coverage:
    name: core · coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Thresholds (lines/functions/branches/statements >= 90) live in
      # packages/core/vitest.config.ts; this fails the PR if coverage drops.
      - run: pnpm --filter @opsboard/core test:coverage

  # @opsboard/core's window-state "closed" cliff is local-end-of-day in the
  # user's tz — run the suite under several zones to catch tz-offset bugs.
  tz-matrix:
    name: core tests · TZ
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tz: ["Africa/Johannesburg", "Europe/Berlin", "UTC"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @opsboard/core test
        env:
          TZ: ${{ matrix.tz }}

  # Real Postgres: the db suite self-migrates (drizzle migrator) + seeds, then
  # exercises the query services and asserts every schema constraint.
  db-integration:
    name: db · integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opsboard
          POSTGRES_PASSWORD: opsboard
          POSTGRES_DB: opsboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @opsboard/db test
        env:
          DATABASE_URL: postgres://opsboard:opsboard@localhost:5432/opsboard_test

  # Real Postgres for the WEB integration suite. The plain `verify` job runs
  # `pnpm test` with no DATABASE_URL, so apps/web's voice-pipeline integration
  # test (safeParseIntent → executeIntent → @opsboard/db, against real SQL)
  # self-SKIPS there. This job gives it a DB so the end-to-end voice write path
  # is actually exercised in CI. The test self-migrates (h.migrate()) in
  # beforeAll, so no separate migrate step is needed.
  web-integration:
    name: web · integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opsboard
          POSTGRES_PASSWORD: opsboard
          POSTGRES_DB: opsboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Just the integration suite (the web unit tests already run in `verify`),
      # so a failure here points squarely at the DB-backed path.
      - run: pnpm --filter @opsboard/web exec vitest run lib/__tests__/voice-pipeline.integration.test.ts
        env:
          DATABASE_URL: postgres://opsboard:opsboard@localhost:5432/opsboard_test

  # Fail if schema.ts changed without regenerating the committed migration.
  migration-drift:
    name: db · migration drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @opsboard/db db:generate
      - name: assert migrations are in sync with schema.ts
        run: |
          if [ -n "$(git status --porcelain packages/db/migrations)" ]; then
            echo "::error::Migration drift — schema.ts changed without regenerating. Run 'pnpm --filter @opsboard/db db:generate' and commit packages/db/migrations."
            git status --porcelain packages/db/migrations
            git --no-pager diff -- packages/db/migrations
            exit 1
          fi
          echo "migrations in sync with schema.ts"

  # Apply the committed migrations (+ seed) to a FRESH ephemeral Neon branch per
  # run — catches Neon-specific issues the Docker service can't (pooled-vs-direct
  # endpoints, cross-schema FK perms, CHECK syntax). Self-deletes the branch;
  # neon-pr-cleanup.yml is the safety net for any orphans. Requires the
  # NEON_API_KEY + NEON_PROJECT_ID repo secrets; SKIPS cleanly until they're set.
  schema-migration:
    name: db · migrate on Neon branch
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate on Neon secrets
        id: gate
        run: |
          if [ -n "${NEON_API_KEY}" ] && [ -n "${NEON_PROJECT_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEON_API_KEY/NEON_PROJECT_ID not set — skipping the Neon-branch migration test."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.enabled == 'true'
      - name: Create ephemeral Neon branch
        id: neon-branch
        if: steps.gate.outputs.enabled == 'true'
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-schema-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Apply migrations (+ seed) to the branch
        if: steps.gate.outputs.enabled == 'true'
        # The action's db_url is the DIRECT (unpooled) endpoint — what migrations
        # need. drizzle.config reads DATABASE_URL (then DATABASE_URL_UNPOOLED).
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm --filter @opsboard/db db:migrate
      - name: Delete the ephemeral Neon branch
        if: always() && steps.gate.outputs.enabled == 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-schema-${{ github.run_id }}-${{ github.run_attempt }}

  # High-severity dependency audit (fails only on >=high; moderate is allowed).
  supply-chain:
    name: supply-chain · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
