name: Delete Neon branch for closed PR

# When a PR closes (merged or not), delete the Neon branch created for its
# preview deployment. The Vercel–Neon integration names preview branches after
# the git head branch:  preview/<head-branch-name>
#
# We match by `preview/<head-branch-name>` PREFIX rather than reconstructing the
# full name — head-ref slugging can differ between Vercel, the Neon integration,
# and branch-name actions, so a prefix match is more robust while staying scoped
# to this PR. (Adopted from camp-404; requires NEON_API_KEY + NEON_PROJECT_ID
# repo secrets — it SKIPS cleanly until those are set.)

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  delete-neon-branch:
    # Fork PRs don't get secrets — skip them at the job level.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch for this PR
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          # Until the Neon secrets are configured, this is a no-op (don't fail
          # closed-PR runs during project setup).
          if [ -z "${NEON_API_KEY:-}" ] || [ -z "${NEON_PROJECT_ID:-}" ]; then
            echo "::notice::NEON_API_KEY/NEON_PROJECT_ID not set — skipping Neon branch cleanup."
            exit 0
          fi

          prefix="preview/${HEAD_REF}"
          echo "Looking up Neon branches with prefix: $prefix"

          api="https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}"
          auth="Authorization: Bearer ${NEON_API_KEY}"

          # Bounded timeouts + bounded retries: transient hangs/5xx get retried,
          # client errors are not (avoids --retry-all-errors).
          curl_opts=(--connect-timeout 10 --max-time 30 --retry 3 --retry-delay 5)

          resp=$(curl -sS "${curl_opts[@]}" -w "\n%{http_code}" -H "$auth" -H "Accept: application/json" "$api/branches")
          body=$(printf '%s' "$resp" | sed '$d')
          status=$(printf '%s' "$resp" | tail -n1)
          if [ "$status" != "200" ]; then
            echo "::error::Neon API returned HTTP $status when listing branches"
            echo "$body"
            exit 1
          fi

          # Non-primary branches matching this PR's prefix → "id<TAB>name".
          targets=$(printf '%s' "$body" | jq -r --arg prefix "$prefix" '
            .branches[]
            | select(.primary != true)
            | select(.name | startswith($prefix))
            | [.id, .name] | @tsv
          ')

          if [ -z "$targets" ]; then
            echo "No Neon branch found for PR #${PR_NUMBER} (prefix: $prefix). Nothing to delete."
            exit 0
          fi

          while IFS=$'\t' read -r id name; do
            [ -z "$id" ] && continue
            echo "Deleting branch: $name (id=$id)"
            del_status=$(curl -sS "${curl_opts[@]}" -o /dev/null -w "%{http_code}" -X DELETE -H "$auth" "$api/branches/$id")
            if [ "$del_status" = "200" ] || [ "$del_status" = "202" ]; then
              echo "  ok"
            else
              echo "::error::Failed to delete $name (HTTP $del_status)"
              exit 1
            fi
          done <<< "$targets"
